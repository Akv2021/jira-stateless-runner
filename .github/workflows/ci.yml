# Continuous Integration for jira-stateless-runner
#
# Gates every push to main and every pull request through the same quality
# bar enforced locally by .pre-commit-config.yaml: gitleaks credential scan,
# ruff lint + format check, strict mypy, and the full pytest suite.
#
# Any step failing fails the build. Secrets used by the runner at runtime
# (JIRA_BASE_URL, JIRA_EMAIL, JIRA_TOKEN) are intentionally NOT referenced
# here — this workflow validates code quality only, not Jira connectivity.

name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (new push to a PR abandons the old run).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege — this workflow reads the repo and writes nothing.
permissions:
  contents: read

jobs:
  ci:
    name: Lint / Type / Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history required so gitleaks can scan past commits, not
          # just the tip. Shallow clones miss secrets introduced upstream.
          fetch-depth: 0

      # Credential scan runs BEFORE pip install so a leaked secret aborts
      # the workflow without downloading any dependencies. Version pinned
      # to match .pre-commit-config.yaml so local and CI scans behave
      # identically.
      - name: Install gitleaks
        run: |
          curl -sSL \
            https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz \
            | tar -xz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Credential scan (gitleaks)
        run: gitleaks detect --redact --verbose --config .gitleaks.toml

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Lint (ruff check)
        run: ruff check .

      - name: Format check (ruff format --check)
        run: ruff format --check .

      - name: Type check (mypy runner tests)
        run: mypy runner tests

      - name: Run tests (pytest)
        run: pytest
