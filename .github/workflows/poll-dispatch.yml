# Poll-dispatch workflow — Rules 1 and 2 (docs/ExternalRunner.md §4.1).
#
# Cron fires every 5 minutes. `concurrency.cancel-in-progress: false`
# prevents overlapping polls from racing on the same watermark (§3.4).
# Timeout sits comfortably under the cron interval so a stuck run never
# blocks the next tick indefinitely.

name: ztmos-poll-dispatch

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: ztmos-poll
  cancel-in-progress: false

permissions:
  contents: read
  issues: write  # §6.4 — `gh issue create` for dead-man's-switch alerts

jobs:
  poll:
    name: Rule 1 / Rule 2 poll
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSL \
            https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz \
            | tar -xz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks

      - name: Credential scan (gitleaks)
        run: gitleaks detect --redact --verbose --config .gitleaks.toml

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install runner
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Restore ephemeral health cache
        uses: actions/cache@v4
        with:
          path: .ztmos-state/
          key: ztmos-state-${{ github.run_id }}
          restore-keys: |
            ztmos-state-

      - name: Poll and dispatch
        run: python -m runner poll
        env:
          JIRA_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER: ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
          JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Save ephemeral health cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .ztmos-state/
          key: ztmos-state-${{ github.run_id }}
